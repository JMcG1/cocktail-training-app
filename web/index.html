<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta
    name="description"
    content="CocktailTraining is a premium bartender training platform built with Flutter for web."
  >
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CocktailTraining">
  <meta name="theme-color" content="#0d1117">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">

  <title>CocktailTraining</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    window.flutterfire_web_sdk_version = '11.9.1';
    window.flutterfire_ignore_scripts = ['core', 'auth', 'firestore'];
  </script>
  <script type="module">
    import * as firebaseCore from 'https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js';
    import * as firebaseAuth from 'https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js';
    import * as firebaseFirestore from 'https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js';

    window.firebase_core = firebaseCore;
    window.firebase_auth = firebaseAuth;
    window.firebase_firestore = firebaseFirestore;

    const bootstrap = document.createElement('script');
    bootstrap.src = 'flutter_bootstrap.js';
    bootstrap.async = true;
    document.body.appendChild(bootstrap);
  </script>
</body>
</html>
